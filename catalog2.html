<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог реальной продукции | HIP KNEE MEDICAL QAZAQSTAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; letter-spacing: -0.025em; }
        .premium-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #1F2937; }
        .premium-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); border-color: #C9A227; }
        .product-img { transition: transform 0.5s ease; }
        .premium-card:hover .product-img { transform: scale(1.03); }
        .filter-btn.active { background-color: #C9A227; color: #0A0A0B; border-color: #C9A227; }
    </style>
</head>
<body class="bg-[#0A0A0B] text-[#F8F8F8]">

    <!-- ==================== NAV ==================== -->
    <nav class="sticky top-0 z-50 bg-[#0A0A0B]/95 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-20">
            <div>
                <span class="text-2xl font-bold heading-serif tracking-[-1.5px]">HIP KNEE MEDICAL QAZAQSTAN</span>
                <span class="ml-2 text-xs font-mono tracking-[2px] text-[#C9A227]">PRO IMPLANT</span>
            </div>
            <button onclick="showContactModal()" 
                    class="px-6 py-2.5 bg-[#C9A227] hover:bg-[#B8971F] text-[#0A0A0B] text-sm font-semibold rounded-full flex items-center gap-x-2">
                <i class="fa-solid fa-envelope"></i>
                <span>Связаться с нами</span>
            </button>
        </div>
    </nav>

    <!-- ==================== HEADER ==================== -->
    <div class="max-w-7xl mx-auto px-6 pt-10 pb-6">
        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
            <div>
                <div class="inline-flex items-center gap-x-2 px-4 py-1.5 rounded-full bg-[#C9A227]/10 text-[#C9A227] text-xs font-semibold tracking-[1.5px] mb-4">
                    РЕАЛЬНЫЕ ФОТОГРАФИИ • ПРЕМИАЛЬНОЕ КАЧЕСТВО
                </div>
                <h1 class="text-5xl md:text-6xl font-bold heading-serif tracking-[-2px]">Каталог реальной продукции</h1>
                <p class="mt-4 text-xl text-white/70">Все фотографии — реальная продукция со склада</p>
            </div>

            <!-- Поиск -->
            <div class="w-full lg:w-96">
                <div class="relative">
                    <input type="text" id="search-input" 
                           class="w-full bg-[#111114] border border-white/20 focus:border-[#C9A227] rounded-2xl pl-12 py-3.5 text-sm outline-none"
                           placeholder="Поиск по названию...">
                    <i class="fa-solid fa-search absolute left-5 top-4 text-white/40"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== ФИЛЬТРЫ ==================== -->
    <div class="max-w-7xl mx-auto px-6 pb-8">
        <div class="flex flex-wrap gap-3" id="filters">
            <button onclick="filterProducts('all')" class="filter-btn active px-6 py-2.5 text-sm font-medium border border-white/30 rounded-2xl flex items-center gap-x-2" data-filter="all">
                <i class="fa-solid fa-th-large"></i> <span>Все продукты</span>
            </button>
            <button onclick="filterProducts('hip')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 rounded-2xl flex items-center gap-x-2" data-filter="hip">
                <i class="fa-solid fa-bone"></i> <span>Тазобедренный сустав</span>
            </button>
            <button onclick="filterProducts('knee')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 rounded-2xl flex items-center gap-x-2" data-filter="knee">
                <i class="fa-solid fa-walking"></i> <span>Коленный сустав</span>
            </button>
            <button onclick="filterProducts('instruments')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 rounded-2xl flex items-center gap-x-2" data-filter="instruments">
                <i class="fa-solid fa-tools"></i> <span>Хирургические инструменты</span>
            </button>
        </div>
        <div class="mt-3 text-sm text-white/60" id="product-count"></div>
    </div>

    <!-- ==================== СЕТКА ПРОДУКТОВ ==================== -->
    <div class="max-w-7xl mx-auto px-6 pb-16">
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

        <!-- Кнопка "Показать ещё" -->
        <div class="flex justify-center mt-10">
            <button id="load-more-btn" onclick="loadMore()"
                    class="hidden px-10 py-3.5 bg-white/5 hover:bg-white/10 border border-white/30 rounded-2xl text-sm font-medium flex items-center gap-x-2">
                Показать ещё <i class="fa-solid fa-arrow-down"></i>
            </button>
        </div>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer class="bg-black py-8 text-center text-sm text-white/50 border-t border-white/10">
        © 2026 HIP KNEE MEDICAL QAZAQSTAN | Pro Implant — Реальная продукция
    </footer>

    <!-- ==================== МОДАЛЬНОЕ ОКНО ДЕТАЛЕЙ ==================== -->
    <div id="product-detail-modal" onclick="if (event.target.id === 'product-detail-modal') hideProductDetailModal()"
         class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="max-w-4xl w-full bg-[#111114] rounded-3xl border border-white/20 overflow-hidden">
            <div class="flex justify-between items-center px-8 pt-8 pb-4 border-b border-white/10">
                <div id="detail-badge" class="px-4 py-1 text-xs font-semibold tracking-wider rounded bg-[#C9A227]/10 text-[#C9A227]"></div>
                <button onclick="hideProductDetailModal()" class="text-3xl text-white/40 hover:text-white">&times;</button>
            </div>
            <div class="p-8 grid md:grid-cols-2 gap-10">
                <div>
                    <img id="detail-image" class="w-full rounded-2xl object-contain bg-[#0A0A0B] p-6 border border-white/10" alt="">
                </div>
                <div>
                    <h3 id="detail-title" class="text-3xl font-semibold mb-3"></h3>
                    <p id="detail-subtitle" class="text-white/70 text-lg mb-6"></p>
                    <div class="mb-8">
                        <h5 class="font-semibold tracking-wider text-xs text-[#C9A227] mb-3">КЛЮЧЕВЫЕ ХАРАКТЕРИСТИКИ</h5>
                        <ul id="detail-features" class="space-y-2 text-sm text-white/85"></ul>
                    </div>
                    <button onclick="requestQuoteFromModal()" 
                            class="w-full py-4 bg-[#C9A227] hover:bg-[#D4B03A] text-[#0A0A0B] font-semibold rounded-2xl">
                        Запросить образцы и коммерческое предложение
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== КОНТАКТНАЯ ФОРМА ==================== -->
    <div id="contact-modal" onclick="if (event.target.id === 'contact-modal') hideContactModal()" 
         class="hidden fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="max-w-lg w-full bg-[#111114] rounded-3xl border border-white/20 p-9">
            <!-- Форма (можно не менять) -->
            <form id="contact-form" onsubmit="submitContactForm(event)">
                <!-- Поля формы -->
                <div class="space-y-5">
                    <div>
                        <label class="text-xs tracking-wider text-white/60 block mb-1.5">ИМЯ И ФАМИЛИЯ</label>
                        <input type="text" id="form-name" required class="w-full bg-[#0A0A0B] border border-white/20 focus:border-[#C9A227] rounded-2xl px-5 py-3.5 text-sm outline-none">
                    </div>
                    <!-- остальные поля -->
                </div>
                <div class="mt-8 flex gap-4">
                    <button type="button" onclick="hideContactModal()" class="flex-1 py-4 rounded-2xl border border-white/30">Отмена</button>
                    <button type="submit" class="flex-1 py-4 rounded-2xl bg-[#C9A227] text-[#0A0A0B] font-semibold">Отправить запрос</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== ГЛАВНЫЙ СКРИПТ ==================== -->
    <script>
        // === 1. ДАННЫЕ ПРОДУКТОВ (ГЛАВНОЕ МЕСТО ДЛЯ РЕДАКТИРОВАНИЯ) ===
        // Здесь вы добавляете, удаляете и меняете продукты.
        // image: "images/название_файла.jpg"  ← меняйте только имя файла
        const products = [
            {
                id: 0,
                category: "instruments",
                badge: "ХИРУРГИЧЕСКИЕ ИНСТРУМЕНТЫ",
                title: "Полный набор инструментов для тазобедренного сустава",
                subtitle: "Профессиональный стерилизационный набор премиум-класса",
                image: "images/инструменты.тазобедренные3.jpg",   // ← меняйте здесь
                features: [
                    "Полный комплект инструментов",
                    "Высококачественная медицинская сталь",
                    "Эргономичные рукоятки",
                    "Стерилизуемый кейс"
                ]
            },
            {
                id: 1,
                category: "instruments",
                badge: "ХИРУРГИЧЕСКИЕ ИНСТРУМЕНТЫ",
                title: "Набор цветных триалов 8–16 мм",
                subtitle: "Цветокодированные триалы разных толщин",
                image: "images/IMG_1062.jpg",
                features: ["Толщины 8, 10, 12, 14, 16 мм", "Цветовая кодировка", "Стерилизуемые"]
            },
            // Добавляйте сюда новые продукты по такому же шаблону...
        ];

        // === 2. ПАГИНАЦИЯ И ФИЛЬТРЫ ===
        let currentFilter = 'all';
        let currentPage = 1;
        const itemsPerPage = 12;
        let filteredProducts = [...products];

        function filterProducts(category) {
            currentFilter = category;
            currentPage = 1;
            // ... (код фильтрации)
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            filteredProducts = products.filter(p => {
                const matchesCategory = currentFilter === 'all' || p.category === currentFilter;
                const matchesSearch = !searchTerm || p.title.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });
            currentPage = 1;
            renderProducts();
        }

        function renderProducts(append = false) {
            const grid = document.getElementById('products-grid');
            if (!append) grid.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const toShow = filteredProducts.slice(start, end);

            toShow.forEach(product => {
                const card = document.createElement('div');
                card.className = `premium-card bg-[#111114] rounded-3xl overflow-hidden border border-white/10`;
                card.innerHTML = `
                    <img src="${product.image}" class="product-img w-full h-64 object-contain bg-[#0A0A0B] p-4" 
                         alt="${product.title}" loading="lazy">
                    <div class="p-5">
                        <span class="text-xs px-3 py-1 rounded-full bg-[#C9A227]/10 text-[#C9A227]">${product.badge}</span>
                        <h3 class="font-semibold text-lg mt-2">${product.title}</h3>
                        <p class="text-sm text-white/70 mt-1">${product.subtitle}</p>
                        <button onclick="showProductDetail(${product.id})" 
                                class="mt-4 w-full py-2.5 text-sm border border-white/30 rounded-2xl hover:bg-white hover:text-black">
                            Подробнее
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Обновляем счётчик и кнопку "Показать ещё"
            document.getElementById('product-count').innerHTML = 
                `Показано <strong>${Math.min(end, filteredProducts.length)}</strong> из <strong>${filteredProducts.length}</strong>`;
            
            const loadMoreBtn = document.getElementById('load-more-btn');
            loadMoreBtn.style.display = (end < filteredProducts.length) ? 'flex' : 'none';
        }

        function loadMore() {
            currentPage++;
            renderProducts(true);
        }

        function showProductDetail(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('detail-badge').innerHTML = product.badge;
            document.getElementById('detail-title').innerHTML = product.title;
            document.getElementById('detail-subtitle').innerHTML = product.subtitle;
            document.getElementById('detail-image').src = product.image;

            const ul = document.getElementById('detail-features');
            ul.innerHTML = product.features.map(f => 
                `<li class="flex gap-x-3"><i class="fa-solid fa-check text-[#C9A227]"></i> ${f}</li>`
            ).join('');

            document.getElementById('product-detail-modal').classList.remove('hidden');
            document.getElementById('product-detail-modal').classList.add('flex');
        }

        function hideProductDetailModal() {
            const modal = document.getElementById('product-detail-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function showContactModal() {
            document.getElementById('contact-modal').classList.remove('hidden');
            document.getElementById('contact-modal').classList.add('flex');
        }

        function hideContactModal() {
            document.getElementById('contact-modal').classList.remove('flex');
            document.getElementById('contact-modal').classList.add('hidden');
        }

        function submitContactForm(e) {
            e.preventDefault();
            alert("Запрос отправлен! (в реальной версии здесь будет отправка на сервер)");
            hideContactModal();
        }

        function initializeCatalog() {
            // Инициализация поиска
            document.getElementById('search-input').addEventListener('input', () => {
                clearTimeout(window.searchTimeout);
                window.searchTimeout = setTimeout(applyFilters, 300);
            });

            // Первоначальная отрисовка
            filteredProducts = [...products];
            renderProducts();

            // Активируем кнопку "Все продукты"
            document.querySelector('#filters button[data-filter="all"]').classList.add('active', 'bg-[#C9A227]', 'text-[#0A0A0B]');
        }

        window.onload = initializeCatalog;
    </script>
</body>
</html>
