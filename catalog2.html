        // Функция рендера карточек (с alt и lazy loading)
        function renderProducts(filteredProducts) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = `premium-card bg-[#111114] rounded-3xl overflow-hidden border border-white/10 product-card`;
                card.dataset.category = product.category;
                card.dataset.name = product.title.toLowerCase();

                card.innerHTML = `
                    <img src="${product.image}" 
                         class="product-img w-full h-64 object-contain bg-[#0A0A0B] p-4" 
                         alt="${product.title} — ${product.subtitle}"
                         loading="lazy">
                    <div class="p-5">
                        <h3 class="font-semibold text-lg">${product.title}</h3>
                        <p class="text-sm text-white/70 mt-1">${product.subtitle}</p>
                        <button onclick="showProductDetail(${product.id})" 
                                class="mt-4 w-full py-2.5 text-sm border border-white/30 hover:bg-white hover:text-black rounded-2xl transition-all">
                            Подробнее
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Остальные функции (filterProducts, showProductDetail, hide..., search и т.д.) оставляем без изменений
        // (они уже были в оригинальном файле)

        function initializeCatalog() {
            // Инициализация поиска и фильтров
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', applyFilters);

            // Начальный рендер
            renderProducts(products);
            
            // Активируем кнопку "Все продукты"
            document.querySelector('#filters button[data-filter="all"]').classList.add('active', 'bg-[#C9A227]', 'text-[#0A0A0B]');
        }

        // Функции filterProducts, applyFilters, showProductDetail и т.д. — оставьте как в оригинале

        window.onload = initializeCatalog;
    </script>
