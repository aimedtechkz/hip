<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог продукции | HIP KNEE MEDICAL QAZAQSTAN | Pro Implant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; letter-spacing: -0.025em; }
        .gold-accent { color: #C9A227; }
        .premium-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #1F2937; }
        .premium-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); border-color: #C9A227; }
        .product-img { transition: transform 0.5s ease; }
        .premium-card:hover .product-img { transform: scale(1.04); }
        .filter-btn.active { background-color: #C9A227; color: #0A0A0B; border-color: #C9A227; }
    </style>
</head>
<body class="bg-[#0A0A0B] text-[#F8F8F8]">
    <!-- NAV -->
    <nav class="sticky top-0 z-50 bg-[#0A0A0B]/95 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-20">
            <div class="flex items-center gap-x-4">
                <a href="index.html" class="flex items-center gap-x-3">
                    <span class="text-2xl font-bold heading-serif tracking-[-1.5px]">HIP KNEE MEDICAL QAZAQSTAN</span>
                    <span class="ml-2 text-xs font-mono tracking-[2px] text-[#C9A227]">PRO IMPLANT</span>
                </a>
            </div>
            <div class="flex items-center gap-x-4">
                <a href="index.html" class="hidden md:flex items-center gap-x-2 text-sm hover:text-[#C9A227] transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>На главную</span>
                </a>
                <button onclick="showContactModal()" class="px-6 py-2.5 bg-[#C9A227] hover:bg-[#B8971F] text-[#0A0A0B] text-sm font-semibold rounded-full transition-all flex items-center gap-x-2">
                    <i class="fa-solid fa-envelope"></i>
                    <span class="hidden sm:inline">Связаться с нами</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="max-w-7xl mx-auto px-6 pt-10 pb-6">
        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
            <div class="max-w-2xl">
                <div class="inline-flex items-center gap-x-2 px-4 py-1.5 rounded-full bg-[#C9A227]/10 text-[#C9A227] text-xs font-semibold tracking-[1.5px] mb-4">
                    ПОЛНЫЙ КАТАЛОГ • РЕАЛЬНАЯ ПРОДУКЦИЯ
                </div>
                <h1 class="text-5xl md:text-6xl font-bold heading-serif tracking-[-2px]">Каталог компонентов</h1>
                <p class="mt-4 text-xl text-white/70">Высокоточные имплантаты и инструменты для эндопротезирования тазобедренного и коленного суставов.</p>
            </div>
            <div class="w-full lg:w-96">
                <div class="relative">
                    <input type="text" id="search-input" class="w-full bg-[#111114] border border-white/20 focus:border-[#C9A227] rounded-2xl pl-12 py-3.5 text-sm outline-none placeholder:text-white/40" placeholder="Поиск по названию...">
                    <i class="fa-solid fa-search absolute left-5 top-4 text-white/40"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-6 pb-8">
        <div class="flex flex-wrap gap-3" id="filters">
            <button onclick="filterProducts('all')" class="filter-btn active px-6 py-2.5 text-sm font-medium border border-white/30 hover:border-white/60 rounded-2xl flex items-center gap-x-2" data-filter="all">
                <i class="fa-solid fa-th-large"></i><span>Все продукты</span>
            </button>
            <button onclick="filterProducts('hip')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 hover:border-white/60 rounded-2xl flex items-center gap-x-2" data-filter="hip">
                <i class="fa-solid fa-bone"></i><span>Тазобедренный сустав</span>
            </button>
            <button onclick="filterProducts('knee')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 hover:border-white/60 rounded-2xl flex items-center gap-x-2" data-filter="knee">
                <i class="fa-solid fa-walking"></i><span>Коленный сустав</span>
            </button>
            <button onclick="filterProducts('instruments')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 hover:border-white/60 rounded-2xl flex items-center gap-x-2" data-filter="instruments">
                <i class="fa-solid fa-tools"></i><span>Хирургические инструменты</span>
            </button>
        </div>
    </div>

    <!-- Products Grid -->
    <div class="max-w-7xl mx-auto px-6 pb-16">
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Карточки генерируются через JavaScript -->
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div id="product-detail-modal" onclick="if (event.target.id === 'product-detail-modal') hideProductDetailModal()" class="hidden fixed inset-0 bg-black/70 z-[100] items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="product-modal bg-[#111114] rounded-3xl max-w-3xl w-full overflow-hidden border border-white/10">
            <div class="flex justify-between items-center p-6 border-b border-white/10">
                <div>
                    <span id="detail-badge" class="px-4 py-1 text-xs font-semibold rounded-full bg-[#C9A227]/10 text-[#C9A227]"></span>
                </div>
                <button onclick="hideProductDetailModal()" class="text-white/60 hover:text-white text-2xl leading-none">×</button>
            </div>
            <div class="p-6">
                <div class="flex flex-col lg:flex-row gap-8">
                    <div class="lg:w-5/12">
                        <img id="detail-image" class="w-full rounded-2xl border border-white/10" alt="">
                    </div>
                    <div class="lg:w-7/12">
                        <h2 id="detail-title" class="text-3xl font-bold heading-serif tracking-tight"></h2>
                        <p id="detail-subtitle" class="mt-2 text-lg text-white/70"></p>
                        <div class="mt-6">
                            <h4 class="font-semibold mb-3 text-[#C9A227]">Ключевые характеристики</h4>
                            <ul id="detail-features" class="space-y-2 text-sm"></ul>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/10 flex gap-3">
                <button onclick="requestQuoteFromModal()" class="flex-1 py-3.5 bg-[#C9A227] hover:bg-[#B8971F] text-[#0A0A0B] font-semibold rounded-2xl transition-all">Запросить коммерческое предложение</button>
                <button onclick="hideProductDetailModal()" class="flex-1 py-3.5 border border-white/30 hover:bg-white/5 rounded-2xl transition-all">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" onclick="if (event.target.id === 'contact-modal') hideContactModal()" class="hidden fixed inset-0 bg-black/70 z-[100] items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#111114] rounded-3xl max-w-md w-full p-8 border border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Связаться с нами</h3>
                <button onclick="hideContactModal()" class="text-3xl leading-none text-white/60 hover:text-white">×</button>
            </div>
            <form id="contact-form" onsubmit="submitContactForm(event)">
                <div class="space-y-4">
                    <input type="text" id="form-name" placeholder="Ваше имя" class="w-full bg-[#0A0A0B] border border-white/20 rounded-2xl px-5 py-3.5 text-sm focus:border-[#C9A227] outline-none" required>
                    <input type="tel" placeholder="Телефон" class="w-full bg-[#0A0A0B] border border-white/20 rounded-2xl px-5 py-3.5 text-sm focus:border-[#C9A227] outline-none" required>
                    <textarea placeholder="Сообщение / интересующий продукт" rows="4" class="w-full bg-[#0A0A0B] border border-white/20 rounded-2xl px-5 py-3.5 text-sm focus:border-[#C9A227] outline-none resize-y"></textarea>
                </div>
                <button type="submit" class="mt-6 w-full py-4 bg-[#C9A227] hover:bg-[#B8971F] text-[#0A0A0B] font-semibold rounded-2xl transition-all">Отправить запрос</button>
            </form>
        </div>
    </div>

    <script>
        // === ИСПРАВЛЕННЫЙ МАССИВ PRODUCTS ===
        const products = [ /* Вставьте сюда массив из Шага 1 выше */ ];

        // Функция рендера карточек (с alt и lazy loading)
        function renderProducts(filteredProducts) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = `premium-card bg-[#111114] rounded-3xl overflow-hidden border border-white/10 product-card`;
                card.dataset.category = product.category;
                card.dataset.name = product.title.toLowerCase();

                card.innerHTML = `
                    <img src="${product.image}" 
                         class="product-img w-full h-64 object-contain bg-[#0A0A0B] p-4" 
                         alt="${product.title} — ${product.subtitle}"
                         loading="lazy">
                    <div class="p-5">
                        <h3 class="font-semibold text-lg">${product.title}</h3>
                        <p class="text-sm text-white/70 mt-1">${product.subtitle}</p>
                        <button onclick="showProductDetail(${product.id})" 
                                class="mt-4 w-full py-2.5 text-sm border border-white/30 hover:bg-white hover:text-black rounded-2xl transition-all">
                            Подробнее
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Остальные функции (filterProducts, showProductDetail, hide..., search и т.д.) оставляем без изменений
        // (они уже были в оригинальном файле)

        function initializeCatalog() {
            // Инициализация поиска и фильтров
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', applyFilters);

            // Начальный рендер
            renderProducts(products);
            
            // Активируем кнопку "Все продукты"
            document.querySelector('#filters button[data-filter="all"]').classList.add('active', 'bg-[#C9A227]', 'text-[#0A0A0B]');
        }

        // Функции filterProducts, applyFilters, showProductDetail и т.д. — оставьте как в оригинале

        window.onload = initializeCatalog;
    </script>
</body>
</html>
