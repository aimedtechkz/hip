    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
     
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
     
        .heading-serif {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            letter-spacing: -0.025em;
        }
        .premium-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #1F2937;
        }
        .premium-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            border-color: #C9A227;
        }
        .product-img {
            transition: transform 0.5s ease;
        }
        .premium-card:hover .product-img {
            transform: scale(1.03);
        }
        .filter-btn {
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background-color: #C9A227;
            color: #0A0A0B;
            border-color: #C9A227;
        }
        .product-modal {
            animation: modalPop 0.2s ease-out forwards;
        }
        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

            </button>
            <button onclick="filterProducts('hip')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 hover:border-white/60 rounded-2xl flex items-center gap-x-2" data-filter="hip">

            <button onclick="filterProducts('instruments')" class="filter-btn px-6 py-2.5 text-sm font-medium border border-white/30 hover:border-white/60 rounded-2xl flex items-center gap-x-2" data-filter="instruments">
